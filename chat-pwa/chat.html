<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat WG</title>

<link rel="manifest" href="manifest.json">

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

<style>
body { margin:0; font-family:Arial; }
#msgs { height:80vh; overflow:auto; padding:10px; }
#input { position:fixed; bottom:0; width:100%; display:flex; }
input { flex:1; padding:10px; }
button { padding:10px; }
</style>

</head>

<body>

<div id="msgs"></div>

<div id="input">
<input id="txt" placeholder="Mensagem">
<button onclick="enviar()">Enviar</button>
</div>

<script src="firebase.js"></script>

<script>
let uid;

firebase.auth().signInAnonymously();

firebase.auth().onAuthStateChanged(user=>{
 uid = user.uid;
 escutar();
});

function enviar(){
 const t = document.getElementById("txt").value;

 db.collection("chat").add({
  texto:t,
  uid,
  timestamp:new Date()
 });

 document.getElementById("txt").value="";
}

function escutar(){
 db.collection("chat")
 .orderBy("timestamp")
 .onSnapshot(snap=>{
  let html="";
  snap.forEach(doc=>{
   const m=doc.data();
   html+=`<div><b>${m.uid}:</b> ${m.texto}</div>`;
  });
  document.getElementById("msgs").innerHTML=html;
 });
}

// SERVICE WORKER
if ("serviceWorker" in navigator) {
 navigator.serviceWorker.register("firebase-messaging-sw.js");
}
</script>

</body>
</html>
