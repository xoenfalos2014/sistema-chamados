<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WG Informática - Portal de Comunicação</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            /* Previne o layout de quebrar em telemóveis quando o teclado abre */
            height: 100dvh; 
            overflow: hidden;
        }
        
        /* Ocultar telas inativas */
        .view-hidden { display: none !important; }
        
        /* Scrollbar customizada */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        /* Fundo do Chat e do Dashboard Moderno */
        .chat-bg {
            background-color: #0f172a;
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Classes para transição suave no Mobile */
        .mobile-hide { display: none !important; }
        @media (min-width: 640px) {
            .mobile-hide { display: flex !important; }
        }

        /* Áudio Player Customizado (mantém o visual escuro) */
        audio {
            height: 36px;
            border-radius: 8px;
            outline: none;
        }
        audio::-webkit-media-controls-panel {
            background-color: #cbd5e1;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 flex flex-col chat-bg">

    <!-- ========================================== -->
    <!-- TELA 1: LOGIN                              -->
    <!-- ========================================== -->
    <div id="view-login" class="flex-1 flex items-center justify-center p-4 overflow-y-auto view-hidden">
        <div class="w-full max-w-sm bg-slate-800 rounded-3xl shadow-2xl p-8 border border-slate-700 relative overflow-hidden">
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-32 bg-teal-500/20 rounded-full blur-3xl pointer-events-none"></div>
            
            <div class="flex justify-center mb-6 relative z-10">
                <div class="bg-slate-900 p-4 rounded-full border border-slate-700 shadow-inner">
                    <i data-lucide="shield-check" class="w-12 h-12 text-teal-500"></i>
                </div>
            </div>
            <div class="relative z-10">
                <h2 class="text-2xl font-bold text-center mb-2 text-slate-100">Portal WG</h2>
                <p class="text-center text-sm text-slate-400 mb-6">Acesso exclusivo para equipe</p>
                
                <form class="space-y-4" id="formLogin">
                    <div>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-3 top-3.5 text-slate-400 w-5 h-5"></i>
                            <input class="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-900 text-white border border-slate-700 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-colors" id="email" placeholder="E-mail corporativo" required="" type="email"/>
                        </div>
                    </div>
                    <div>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-3 top-3.5 text-slate-400 w-5 h-5"></i>
                            <input class="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-900 text-white border border-slate-700 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-colors" id="senha" placeholder="Senha" required="" type="password"/>
                        </div>
                    </div>
                    <button class="w-full bg-teal-600 text-white font-semibold py-3.5 rounded-xl hover:bg-teal-500 transition-all transform hover:-translate-y-0.5 shadow-lg shadow-teal-500/25 mt-2" type="submit" id="btnLogin">Entrar no Sistema</button>
                </form>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- TELA 2: PORTAL DE BOAS VINDAS (DASHBOARD)  -->
    <!-- ========================================== -->
    <div id="view-dashboard" class="flex-1 flex flex-col overflow-y-auto view-hidden relative">
        <header class="bg-slate-800/80 backdrop-blur-md shadow-lg shrink-0 border-b border-slate-700 sticky top-0 z-20">
            <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-teal-600 rounded-lg flex items-center justify-center">
                        <i data-lucide="monitor" class="w-5 h-5 text-white"></i>
                    </div>
                    <h1 class="text-xl font-bold text-white">WG Informática</h1>
                </div>
                <button id="btnLogout" class="text-slate-300 hover:text-red-400 transition-colors flex items-center gap-2 text-sm font-semibold bg-slate-900/50 px-4 py-2 rounded-lg border border-slate-700/50">
                    <i data-lucide="log-out" class="w-4 h-4"></i> <span>Sair</span>
                </button>
            </div>
        </header>

        <main class="w-full max-w-lg mx-auto py-8 sm:py-12 px-4 flex-1 flex flex-col items-center justify-center relative z-10">
            <div class="bg-slate-800 p-8 sm:p-10 rounded-3xl shadow-2xl border border-slate-700 text-center w-full relative overflow-hidden">
                <div class="absolute -top-10 -right-10 w-40 h-40 bg-teal-500/10 rounded-full blur-3xl pointer-events-none"></div>

                <div class="w-20 h-20 bg-slate-900 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner border border-slate-700">
                    <i data-lucide="user" class="w-10 h-10 text-teal-400"></i>
                </div>
                
                <h2 class="text-2xl sm:text-3xl font-bold text-white mb-2" id="welcomeMessage">Olá, Equipe!</h2>
                <p class="text-slate-400 mb-8 sm:mb-10 text-sm sm:text-base">Acesse o canal de comunicação exclusiva em tempo real.</p>

                <button class="w-full bg-teal-600 hover:bg-teal-500 text-white font-bold py-4 px-6 rounded-2xl transition-all transform hover:scale-[1.02] active:scale-95 shadow-lg shadow-teal-500/20 flex items-center justify-center gap-3 text-lg relative group" onclick="appState.switchView('view-chat')">
                    <i data-lucide="message-circle" class="w-6 h-6 group-hover:animate-pulse"></i>
                    Chat da Equipe
                    <span id="globalChatBadge" class="hidden absolute -top-3 -right-3 bg-red-500 text-white text-sm font-bold rounded-full h-8 w-8 flex items-center justify-center animate-bounce shadow-md border-4 border-slate-800">0</span>
                </button>
            </div>

    </div>

    <!-- ========================================== -->
    <!-- TELA 3: CHAT DA EQUIPE                     -->
    <!-- ========================================== -->
    <div id="view-chat" class="flex-1 flex flex-col h-full overflow-hidden view-hidden relative">
        <header class="bg-slate-800/90 backdrop-blur-md shadow-lg shrink-0 border-b border-slate-700 z-20">
            <div class="max-w-7xl mx-auto py-3 px-4 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <button onclick="appState.switchView('view-dashboard')" class="flex items-center gap-2 px-3 py-2 hover:bg-slate-700 rounded-lg transition-colors text-slate-300 bg-slate-800 border border-slate-600 shadow-sm">
                        <i data-lucide="arrow-left" class="w-5 h-5"></i>
                        <span class="text-sm font-semibold">Voltar</span>
                    </button>
                    <h1 class="text-lg sm:text-xl font-bold text-white ml-2">Chat WG</h1>
                </div>
                <div class="text-xs sm:text-sm px-3 py-1 bg-slate-900 rounded-full border border-slate-700 text-teal-400 font-medium flex items-center gap-2" id="currentUserDisplay">
                    <div class="w-2 h-2 bg-teal-500 rounded-full animate-pulse"></div>
                    Conectado
                </div>
            </div>
        </header>

        <main class="flex-1 flex overflow-hidden w-full max-w-7xl mx-auto relative">
            <div class="flex w-full h-full bg-slate-800/90 backdrop-blur-sm sm:rounded-b-3xl shadow-2xl border-x border-b border-slate-700 overflow-hidden relative">
                
                <!-- Barra Lateral (Contatos) -->
                <div id="sidebar" class="w-full sm:w-80 md:w-96 flex flex-col border-r border-slate-700 bg-slate-900/50 absolute sm:relative h-full z-10 transition-transform duration-300">
                    <div class="p-3 sm:p-4 border-b border-slate-700 bg-slate-800/80">
                        <div class="relative">
                            <i data-lucide="search" class="absolute left-3 top-2.5 text-slate-400 w-5 h-5"></i>
                            <input type="text" id="searchInput" placeholder="Buscar parceiro..." 
                                   class="w-full bg-slate-900 text-white pl-10 pr-4 py-2 rounded-xl border border-slate-700 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-colors text-sm">
                        </div>
                    </div>
                    <div class="flex-1 overflow-y-auto" id="techList">
                        <div class="p-8 text-center text-slate-500 text-sm flex flex-col items-center">
                            <i data-lucide="loader" class="w-8 h-8 animate-spin mb-2"></i>
                            Carregando equipe...
                        </div>
                    </div>
                </div>

                <!-- Área do Chat -->
                <div id="chatArea" class="w-full flex-1 flex flex-col relative bg-slate-900/30 mobile-hide h-full z-0 transition-opacity">
                    <!-- Cabeçalho do Chat Ativo -->
                    <div class="bg-slate-800/95 p-3 flex items-center gap-3 border-b border-slate-700 z-10 backdrop-blur-md shadow-sm shrink-0">
                        <button id="backToListBtn" class="sm:hidden flex items-center gap-1 pr-2 text-slate-300 hover:text-white transition-colors">
                            <i data-lucide="arrow-left" class="w-6 h-6"></i>
                        </button>
                        <div class="relative">
                            <div class="w-10 h-10 sm:w-12 sm:h-12 bg-gradient-to-br from-teal-500 to-teal-700 text-white rounded-full flex items-center justify-center font-bold text-lg shadow-inner border border-teal-400/20" id="activeTechAvatar">?</div>
                            <div id="activeTechStatusDot" class="hidden absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-slate-800 rounded-full"></div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h2 class="font-semibold text-white tracking-wide truncate" id="activeTechName">Selecione um contato</h2>
                            <p class="text-xs text-slate-400 truncate" id="activeTechRole">Aguardando...</p>
                        </div>
                    </div>

                    <!-- Mensagens -->
                    <div class="flex-1 overflow-y-auto p-4 space-y-3 z-10 scroll-smooth" id="messagesContainer">
                        <div class="flex h-full items-center justify-center text-center">
                            <div>
                                <div class="bg-slate-800 p-5 rounded-full inline-block mb-4 border border-slate-700 shadow-xl">
                                    <i data-lucide="message-square-text" class="w-12 h-12 text-teal-500"></i>
                                </div>
                                <h3 class="text-xl font-medium text-white mb-2">Comunicação Segura</h3>
                                <p class="text-slate-400 text-sm max-w-xs mx-auto">
                                    Selecione um membro da equipe para enviar mensagens.
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- Input Area -->
                    <div class="bg-slate-800/95 p-2 sm:p-4 border-t border-slate-700 z-10 backdrop-blur-md shrink-0">
                        <form id="messageForm" class="flex gap-2 w-full max-w-4xl mx-auto relative items-end">
                            <!-- Botões Iniciais e Textarea -->
                            <button type="button" id="btnImproveMsg" onclick="appState.melhorarMensagem()" class="bg-slate-700 hover:bg-purple-600/90 text-purple-400 hover:text-white h-[44px] w-[44px] rounded-xl transition-all flex items-center justify-center disabled:opacity-50 border border-slate-600 shadow-md shrink-0" title="Melhorar com IA">
                                <i data-lucide="sparkles" class="w-5 h-5"></i>
                            </button>
                            
                            <button type="button" id="btnRecordAudio" onclick="appState.startRecording()" class="bg-slate-700 hover:bg-slate-600 text-slate-300 hover:text-white h-[44px] w-[44px] rounded-xl transition-all flex items-center justify-center disabled:opacity-50 border border-slate-600 shadow-md shrink-0" title="Gravar Áudio (Máx 15s)">
                                <i data-lucide="mic" class="w-5 h-5"></i>
                            </button>
                            
                            <textarea id="messageInput" disabled rows="1"
                                placeholder="Digite a mensagem..." 
                                class="flex-1 bg-slate-900 text-white px-4 py-2.5 rounded-xl border border-slate-700 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 disabled:opacity-50 shadow-inner resize-none min-h-[44px] max-h-24 overflow-y-auto leading-relaxed"></textarea>
                                
                            <!-- NOVO UI DE GRAVAÇÃO (Oculto por Padrão) -->
                            <div id="recordingUI" class="hidden flex-1 h-[44px] items-center justify-between bg-slate-900 border border-red-500/50 rounded-xl px-4 shadow-inner">
                                <div class="flex items-center gap-3">
                                    <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(239,68,68,0.8)]"></div>
                                    <span id="recordingTimer" class="text-red-400 font-mono font-medium tracking-wider">00:00 / 00:15</span>
                                </div>
                                <button type="button" onclick="appState.cancelRecording()" class="text-slate-400 hover:text-red-500 transition-colors p-1" title="Cancelar Gravação">
                                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                                </button>
                            </div>

                            <button type="submit" id="sendBtn" disabled
                                class="bg-teal-600 hover:bg-teal-500 text-white h-[44px] w-[44px] rounded-xl transition-all flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shrink-0">
                                <i data-lucide="send" class="w-5 h-5 ml-1"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- ========================================== -->
    <!-- LÓGICA DO APLICATIVO                       -->
    <!-- ========================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot, addDoc, getDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js";

        lucide.createIcons();

        const firebaseConfig = {
          apiKey: "AIzaSyBOc-qReOgBoDWQOYVNSlNMgRjF_hfH6uw",
          authDomain: "sistema-chamados-99e49.firebaseapp.com",
          projectId: "sistema-chamados-99e49"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- Configuração da IA Gemini ---
        const apiKey = ""; 
        
        async function callGeminiAPI(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = { contents: [{ parts: [{ text: prompt }] }] };
            try {
                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "Erro ao gerar.";
            } catch (error) {
                return "Erro de conexão.";
            }
        }

        const playNotificationSound = () => {
            try {
                const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
                audio.play().catch(() => {});
            } catch (e) {}
        };

        // Auto-ajuste do tamanho do textarea e habilitar/desabilitar botão Enviar
        const msgInput = document.getElementById('messageInput');
        msgInput.addEventListener('input', function() {
            appState.handleTyping();
            const btnSend = document.getElementById('sendBtn');
            btnSend.disabled = this.value.trim() === '';
            
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // --- Estado Global ---
        window.appState = {
            currentUser: null,
            selectedTechId: null,
            allMessages: [],
            unreadCounts: {}, 
            unsubMessages: null,
            usersData: {}, 
            isTypingTimer: null,
            
            // Variáveis de Gravação de Áudio
            isRecording: false,
            isCancelled: false,
            mediaRecorder: null,
            audioChunks: [],
            recordingInterval: null,
            
            switchView: (viewId) => {
                document.querySelectorAll('div[id^="view-"]').forEach(el => el.classList.add('view-hidden'));
                document.getElementById(viewId).classList.remove('view-hidden');
                if(viewId === 'view-chat') appState.initChat();
            },

            // --- Lógica de Presença ---
            updatePresence: async (isOnline) => {
                if (!appState.currentUser) return;
                try {
                    await updateDoc(doc(db, "usuarios", appState.currentUser.uid), {
                        isOnline: isOnline,
                        lastActive: Date.now()
                    });
                } catch(e) { console.log("Sem permissão para atualizar presença."); }
            },

            setTypingStatus: async (isTyping) => {
                if (!appState.currentUser) return;
                try {
                    await updateDoc(doc(db, "usuarios", appState.currentUser.uid), {
                        typingTo: isTyping ? appState.selectedTechId : null
                    });
                } catch(e) {}
            },

            handleTyping: () => {
                if(!appState.selectedTechId) return;
                appState.setTypingStatus(true);
                clearTimeout(appState.isTypingTimer);
                appState.isTypingTimer = setTimeout(() => {
                    appState.setTypingStatus(false);
                }, 2000);
            },

            // --- Gravação de Áudio Renovada ---
            startRecording: async () => {
                if (!appState.selectedTechId) {
                    alert("Selecione um contato primeiro.");
                    return;
                }
                
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    appState.mediaRecorder = new MediaRecorder(stream);
                    appState.audioChunks = [];
                    appState.isRecording = true;
                    appState.isCancelled = false; // Reset de flag

                    // Alternar Interface para o Modo Gravador
                    document.getElementById('btnImproveMsg').classList.add('hidden');
                    document.getElementById('btnRecordAudio').classList.add('hidden');
                    document.getElementById('messageInput').classList.add('hidden');
                    
                    const recUI = document.getElementById('recordingUI');
                    recUI.classList.remove('hidden');
                    recUI.classList.add('flex');

                    const btnSend = document.getElementById('sendBtn');
                    btnSend.disabled = false;
                    btnSend.classList.add('animate-pulse'); // Pisca para chamar atenção

                    let secondsElapsed = 0;
                    const timerDisplay = document.getElementById('recordingTimer');
                    timerDisplay.innerText = `00:00 / 00:15`;

                    appState.recordingInterval = setInterval(() => {
                        secondsElapsed++;
                        timerDisplay.innerText = `00:${secondsElapsed.toString().padStart(2, '0')} / 00:15`;
                        if(secondsElapsed >= 15) {
                            appState.stopRecording(); // Para automaticamente e envia aos 15s
                        }
                    }, 1000);

                    appState.mediaRecorder.ondataavailable = e => {
                        if (e.data.size > 0) appState.audioChunks.push(e.data);
                    };

                    appState.mediaRecorder.onstop = () => {
                        clearInterval(appState.recordingInterval);
                        appState.resetRecordingUI();

                        if (appState.isCancelled) return; // Se foi cancelado, aborta a gravação
                        if (appState.audioChunks.length === 0) return;

                        const mimeType = appState.mediaRecorder.mimeType || 'audio/webm';
                        const audioBlob = new Blob(appState.audioChunks, { type: mimeType });
                        
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = async () => {
                            const base64Audio = reader.result;
                            try {
                                await addDoc(collection(db, 'chat_equipe'), {
                                    text: "🎵 Mensagem de Áudio", 
                                    audioData: base64Audio,
                                    senderId: appState.currentUser.uid,
                                    receiverId: appState.selectedTechId,
                                    participants: [appState.currentUser.uid, appState.selectedTechId],
                                    timestamp: Date.now(),
                                    read: false,
                                    expiresAt: new Date(Date.now() + 24 * 60 * 60 * 1000) 
                                });
                            } catch (e) {
                                console.error(e);
                                alert("Falha ao enviar áudio. Limite de tamanho excedido ou erro de conexão.");
                            }
                        };
                    };

                    appState.mediaRecorder.start();

                } catch (err) {
                    console.error("Erro microfone:", err);
                    alert("Permissão de microfone negada ou recurso não suportado neste dispositivo.");
                }
            },

            cancelRecording: () => {
                if (!appState.isRecording) return;
                appState.isCancelled = true;
                
                if (appState.mediaRecorder && appState.mediaRecorder.state !== 'inactive') {
                    appState.mediaRecorder.stop();
                    appState.mediaRecorder.stream.getTracks().forEach(track => track.stop()); 
                }
                appState.resetRecordingUI();
            },

            stopRecording: () => {
                if (!appState.isRecording) return;
                appState.isRecording = false;
                
                if (appState.mediaRecorder && appState.mediaRecorder.state !== 'inactive') {
                    appState.mediaRecorder.stop();
                    appState.mediaRecorder.stream.getTracks().forEach(track => track.stop()); 
                }
            },

            resetRecordingUI: () => {
                appState.isRecording = false;
                clearInterval(appState.recordingInterval);

                document.getElementById('btnImproveMsg').classList.remove('hidden');
                document.getElementById('btnRecordAudio').classList.remove('hidden');
                document.getElementById('messageInput').classList.remove('hidden');
                
                const recUI = document.getElementById('recordingUI');
                recUI.classList.add('hidden');
                recUI.classList.remove('flex');
                
                const btnSend = document.getElementById('sendBtn');
                btnSend.classList.remove('animate-pulse');
                
                const input = document.getElementById('messageInput');
                if (input.value.trim() === '') {
                    btnSend.disabled = true;
                }
            },

            // --- Ouvinte de Mensagens (Com Filtro de 24h na Tela) ---
            startGlobalMessageListener: () => {
                if (appState.unsubMessages) return;

                if ("Notification" in window && Notification.permission === "default") {
                    Notification.requestPermission();
                }

                const qMsg = query(collection(db, "chat_equipe"), where("participants", "array-contains", appState.currentUser.uid));
                let isFirstLoad = true;

                appState.unsubMessages = onSnapshot(qMsg, (snapshot) => {
                    appState.allMessages = [];
                    // Calcula a data de 24 horas atrás em milissegundos
                    const timeLimit = Date.now() - (24 * 60 * 60 * 1000); 

                    snapshot.forEach(doc => {
                        const msgData = doc.data();
                        
                        // FILTRO NA TELA: Só mostra a mensagem se ela tiver sido enviada nas últimas 24h
                        if (msgData.timestamp >= timeLimit) {
                            appState.allMessages.push({ id: doc.id, ...msgData });
                        }
                    });
                    
                    const getTime = (ts) => (ts && ts.toDate) ? ts.toDate().getTime() : (ts || 0);
                    appState.allMessages.sort((a, b) => getTime(a.timestamp) - getTime(b.timestamp));

                    if (!isFirstLoad) {
                        snapshot.docChanges().forEach(change => {
                            if (change.type === "added") {
                                const msg = change.doc.data();
                                // Só notifica se a mensagem for recente (evita notificações de msg antigas ao logar)
                                if (msg.senderId !== appState.currentUser.uid && msg.timestamp >= timeLimit) {
                                    const isViewingChat = !document.getElementById('view-chat').classList.contains('view-hidden');
                                    const isChattingWithSender = appState.selectedTechId === msg.senderId;
                                    const isMobileHidden = document.getElementById('chatArea').classList.contains('mobile-hide');
                                    
                                    if (!(isViewingChat && isChattingWithSender && !isMobileHidden)) {
                                        playNotificationSound();
                                        if ("Notification" in window && Notification.permission === "granted") {
                                            new Notification("Nova Mensagem WG", { body: msg.text });
                                        }
                                        appState.unreadCounts[msg.senderId] = (appState.unreadCounts[msg.senderId] || 0) + 1;
                                        appState.updateBadges();
                                    }
                                }
                            }
                        });
                    }
                    isFirstLoad = false;

                    if (appState.selectedTechId) {
                        appState.renderMessages();
                    }
                });
            },

            updateBadges: () => {
                const totalUnread = Object.values(appState.unreadCounts).reduce((a, b) => a + b, 0);
                const globalBadge = document.getElementById('globalChatBadge');
                if (globalBadge) {
                    globalBadge.innerText = totalUnread > 99 ? '99+' : totalUnread;
                    totalUnread > 0 ? globalBadge.classList.remove('hidden') : globalBadge.classList.add('hidden');
                }

                Object.entries(appState.unreadCounts).forEach(([techId, count]) => {
                    const techDiv = document.getElementById(`tech-item-${techId}`);
                    if (techDiv) {
                        let badge = techDiv.querySelector('.unread-badge');
                        if (count > 0) {
                            if (!badge) {
                                badge = document.createElement('div');
                                badge.className = 'unread-badge w-5 h-5 bg-teal-500 rounded-full flex items-center justify-center text-[10px] font-bold text-white ml-auto shadow-md';
                                techDiv.appendChild(badge);
                            }
                            badge.innerText = count;
                        } else if (badge) {
                            badge.remove();
                        }
                    }
                });
            },

            // --- IA Gemini ---
            melhorarMensagem: async () => {
                const input = document.getElementById('messageInput');
                const textoOriginal = input.value.trim();
                
                if (!textoOriginal) {
                    alert('Digite algo para a IA melhorar.');
                    return;
                }

                const btn = document.getElementById('btnImproveMsg');
                const iconeOriginal = btn.innerHTML;
                
                btn.innerHTML = `<i data-lucide="loader" class="w-5 h-5 animate-spin text-purple-300"></i>`;
                btn.disabled = true;

                const prompt = `Reescreva esta mensagem de suporte técnico corporativo de forma profissional, educada e direta. Retorne APENAS o texto: "${textoOriginal}"`;
                const resposta = await callGeminiAPI(prompt);
                
                if (!resposta.includes('Erro')) {
                    input.value = resposta.trim().replace(/^"|"$/g, '');
                    input.style.height = 'auto';
                    input.style.height = (input.scrollHeight) + 'px';
                }
                
                btn.innerHTML = iconeOriginal;
                btn.disabled = false;
                lucide.createIcons();
            },

            // --- Lógica do Chat ---
            initChat: () => {
                const techListEl = document.getElementById('techList');
                const q = query(collection(db, "usuarios"), where("tipo", "in", ["tecnico", "admin", "administrador"]));
                
                onSnapshot(q, (snapshot) => {
                    techListEl.innerHTML = '';
                    if (snapshot.empty) return;
                    
                    snapshot.forEach(docSnap => {
                        const tech = docSnap.data();
                        const techId = docSnap.id;
                        appState.usersData[techId] = tech; 

                        if (techId === appState.currentUser.uid) return;

                        const nome = tech.nome || tech.email.split('@')[0];
                        const roleLabel = (tech.tipo === 'admin' || tech.tipo === 'administrador') ? 'Admin WG' : 'Técnico WG';
                        const isOnline = tech.isOnline;

                        const div = document.createElement('div');
                        div.id = `tech-item-${techId}`;
                        div.className = "tech-item flex items-center gap-3 p-3 sm:p-4 cursor-pointer hover:bg-slate-800 transition-colors border-b border-slate-700/30 group";
                        div.onclick = () => appState.selectTechnician(techId, nome);
                        
                        div.innerHTML = `
                            <div class="relative">
                                <div class="w-10 h-10 sm:w-12 sm:h-12 bg-slate-700 text-teal-300 rounded-full flex items-center justify-center font-bold text-base sm:text-lg shrink-0 border border-slate-600">${nome.charAt(0).toUpperCase()}</div>
                                ${isOnline ? '<div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-slate-900 rounded-full"></div>' : ''}
                            </div>
                            <div class="flex-1 min-w-0">
                                <h3 class="text-slate-200 font-medium truncate tech-name text-sm sm:text-base">${nome}</h3>
                                <p class="text-[11px] sm:text-xs text-slate-500 tech-role ${tech.typingTo === appState.currentUser.uid ? 'text-teal-400 font-medium italic' : ''}">
                                    ${tech.typingTo === appState.currentUser.uid ? 'Digitando...' : roleLabel}
                                </p>
                            </div>`;
                        techListEl.appendChild(div);
                    });
                    
                    appState.updateBadges();
                    appState.updateActiveHeader();
                });
            },

            updateActiveHeader: () => {
                if (!appState.selectedTechId) return;
                const tech = appState.usersData[appState.selectedTechId];
                if (!tech) return;

                const roleEl = document.getElementById('activeTechRole');
                const dotEl = document.getElementById('activeTechStatusDot');

                if (tech.typingTo === appState.currentUser.uid) {
                    roleEl.innerHTML = '<span class="text-teal-400 font-medium italic">Digitando...</span>';
                    dotEl.classList.remove('hidden');
                } else if (tech.isOnline) {
                    roleEl.innerHTML = '<span class="text-teal-400">Online</span>';
                    dotEl.classList.remove('hidden');
                } else {
                    dotEl.classList.add('hidden');
                    if (tech.lastActive) {
                        const timeStr = new Date(tech.lastActive).toLocaleTimeString('pt-BR', {hour: '2-digit', minute: '2-digit'});
                        roleEl.innerHTML = `Visto por último às ${timeStr}`;
                    } else {
                        roleEl.innerHTML = 'Offline';
                    }
                }
            },

            selectTechnician: (techId, nome) => {
                appState.selectedTechId = techId;
                document.getElementById('activeTechName').innerText = nome;
                document.getElementById('activeTechAvatar').innerText = nome.charAt(0).toUpperCase();
                
                appState.updateActiveHeader();
                
                if (appState.unreadCounts[techId]) {
                    appState.unreadCounts[techId] = 0;
                    appState.updateBadges();
                }

                // Reseta estado se estivesse gravando e trocou de aba
                if (appState.isRecording) {
                    appState.cancelRecording();
                }

                const input = document.getElementById('messageInput');
                const btnRecord = document.getElementById('btnRecordAudio');
                
                input.disabled = false; 
                btnRecord.disabled = false;

                const sidebar = document.getElementById('sidebar');
                const chatArea = document.getElementById('chatArea');
                
                if (window.innerWidth < 640) {
                    sidebar.classList.add('mobile-hide');
                    chatArea.classList.remove('mobile-hide');
                }
                
                appState.renderMessages();
            },

            renderMessages: () => {
                const container = document.getElementById('messagesContainer');
                const msgs = appState.allMessages.filter(msg => msg.participants.includes(appState.selectedTechId));
                
                if (msgs.length === 0) {
                    container.innerHTML = `
                        <div class="flex justify-center mt-6">
                            <div class="bg-slate-800/80 border border-slate-700 text-slate-400 text-xs px-6 py-2 rounded-full shadow-sm flex items-center gap-2 backdrop-blur-sm">
                                <i data-lucide="lock" class="w-3 h-3"></i> Conversa protegida de ponta a ponta
                            </div>
                        </div>`;
                    lucide.createIcons();
                    return;
                }

                container.innerHTML = '';
                msgs.forEach((msg, index) => {
                    const isMine = msg.senderId === appState.currentUser.uid;
                    
                    if (!isMine && !msg.read) {
                        updateDoc(doc(db, 'chat_equipe', msg.id), { read: true }).catch(()=>{});
                    }

                    const dataAtual = msg.timestamp && msg.timestamp.toDate ? msg.timestamp.toDate() : new Date(msg.timestamp);
                    const time = isNaN(dataAtual) ? "" : dataAtual.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                    
                    const prevMsg = index > 0 ? msgs[index - 1] : null;
                    const sameSender = prevMsg && prevMsg.senderId === msg.senderId;
                    const marginClass = sameSender ? 'mb-1' : 'mb-4 mt-2';

                    const wrapper = document.createElement('div');
                    wrapper.className = `flex ${isMine ? 'justify-end' : 'justify-start'} ${marginClass}`;
                    
                    const bubbleClass = isMine 
                        ? 'bg-teal-700 text-white rounded-l-2xl rounded-tr-2xl' 
                        : 'bg-slate-700 text-slate-100 rounded-r-2xl rounded-tl-2xl';

                    let checks = '';
                    if (isMine) {
                        if (msg.read) {
                            checks = '<i data-lucide="check-check" class="w-3.5 h-3.5 text-blue-400"></i>'; 
                        } else {
                            checks = '<i data-lucide="check" class="w-3.5 h-3.5 text-slate-300"></i>'; 
                        }
                    }

                    // Renderiza Texto ou Áudio
                    let contentHtml = '';
                    if (msg.audioData) {
                        contentHtml = `
                            <div class="flex items-center gap-2 pb-2 min-w-[200px]">
                                <i data-lucide="mic" class="w-4 h-4 text-slate-300/80 shrink-0"></i>
                                <audio controls src="${msg.audioData}" class="w-full h-8 outline-none custom-audio"></audio>
                            </div>
                        `;
                    } else {
                        contentHtml = `<p class="text-[14px] sm:text-[15px] break-words leading-relaxed pb-3">${msg.text}</p>`;
                    }

                    wrapper.innerHTML = `
                        <div class="max-w-[85%] sm:max-w-[75%] px-3 sm:px-4 py-2 shadow-md relative group ${bubbleClass} ${sameSender ? (isMine ? 'rounded-tr-md' : 'rounded-tl-md') : ''}">
                            ${contentHtml}
                            <div class="absolute bottom-1 right-2 flex items-center gap-1 opacity-80">
                                <span class="text-[9px] sm:text-[10px]">${time}</span>
                                ${checks}
                            </div>
                        </div>`;
                    container.appendChild(wrapper);
                });
                lucide.createIcons();
                
                setTimeout(() => {
                    container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
                }, 100);
            }
        };

        // --- Event Listeners Globais ---
        
        window.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                appState.updatePresence(true);
            } else {
                appState.updatePresence(false);
                appState.setTypingStatus(false);
            }
        });
        window.addEventListener('beforeunload', () => {
            appState.updatePresence(false);
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "usuarios", user.uid));
                const userData = userDoc.exists() ? userDoc.data() : { tipo: 'tecnico' };
                
                if (userData.tipo === "tecnico" || userData.tipo === "admin" || userData.tipo === "administrador") {
                    appState.currentUser = { uid: user.uid, nome: userData.nome || user.email.split('@')[0], ...userData };
                    
                    const primeiroNome = appState.currentUser.nome.split(' ')[0];
                    document.getElementById('welcomeMessage').innerText = `Olá, ${primeiroNome}!`;
                    document.getElementById('currentUserDisplay').innerHTML = `<div class="w-2 h-2 bg-teal-500 rounded-full animate-pulse"></div> ${primeiroNome}`;
                    
                    appState.updatePresence(true); 
                    appState.startGlobalMessageListener(); 
                    appState.switchView('view-dashboard');
                } else {
                    alert("Acesso restrito apenas para a equipe técnica.");
                    signOut(auth);
                }
            } else {
                appState.updatePresence(false); 
                if (appState.unsubMessages) {
                    appState.unsubMessages();
                    appState.unsubMessages = null;
                }
                appState.switchView('view-login');
            }
        });

        document.getElementById("formLogin").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;
            const btn = document.getElementById("btnLogin");
            
            const textoOriginal = btn.innerText;
            btn.innerHTML = `<i data-lucide="loader" class="w-5 h-5 animate-spin mx-auto"></i>`;
            
            try {
                await signInWithEmailAndPassword(auth, email, senha);
            } catch (err) {
                alert("Erro ao fazer login. Verifique as credenciais.");
                btn.innerText = textoOriginal;
            }
        });

        document.getElementById('messageForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Se estiver gravando, clique no enter/enviar vai parar e enviar o áudio
            if (appState.isRecording) {
                appState.stopRecording();
                return;
            }

            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !appState.selectedTechId) return;

            input.value = '';
            input.style.height = 'auto'; 
            appState.setTypingStatus(false);
            
            // Desabilita o botão send imediatamente após limpar
            document.getElementById('sendBtn').disabled = true;
            
            try {
                await addDoc(collection(db, 'chat_equipe'), {
                    text: text,
                    senderId: appState.currentUser.uid,
                    receiverId: appState.selectedTechId,
                    participants: [appState.currentUser.uid, appState.selectedTechId],
                    timestamp: Date.now(),
                    read: false,
                    // DATA DE EXPIRAÇÃO PARA O FIREBASE APAGAR (24 horas depois)
                    expiresAt: new Date(Date.now() + 24 * 60 * 60 * 1000)
                });
            } catch (e) {
                alert("Falha ao enviar a mensagem. Verifique a conexão.");
            }
        });

        document.getElementById("btnLogout").addEventListener("click", () => {
            appState.updatePresence(false);
            signOut(auth);
        });

        document.getElementById('backToListBtn').addEventListener('click', () => {
            appState.selectedTechId = null;
            appState.updateActiveHeader();
            document.getElementById('sidebar').classList.remove('mobile-hide');
            document.getElementById('chatArea').classList.add('mobile-hide');
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.tech-item').forEach(item => {
                const name = item.querySelector('.tech-name').innerText.toLowerCase();
                const role = item.querySelector('.tech-role').innerText.toLowerCase();
                item.style.display = (name.includes(term) || role.includes(term)) ? 'flex' : 'none';
            });
        });

        document.getElementById('messageInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('messageForm').dispatchEvent(new Event('submit'));
            }
        });

    </script>
</body>
</html>
