<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor WG PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
body { font-family: 'Poppins', sans-serif; }
.card:hover { transform: scale(1.02); transition:.2s }
</style>
</head>

<body class="bg-slate-900 text-white flex h-screen">

<!-- SIDEBAR -->
<aside class="w-64 bg-slate-800 border-r border-slate-700 p-4 flex flex-col">

<button onclick="openAddClientModal()" class="bg-teal-600 hover:bg-teal-500 p-2 rounded mb-4">
+ Empresa
</button>

<div id="clientList" class="space-y-2 overflow-y-auto"></div>
</aside>

<!-- MAIN -->
<main class="flex-1 flex flex-col">

<div class="bg-slate-800 border-b border-slate-700 p-4 flex justify-between items-center">

<h1 id="currentClientTitle" class="text-xl font-bold text-slate-100">
Selecione empresa
</h1>

<div class="flex gap-2 items-center">

<input id="searchInput" onkeyup="render()"
placeholder="Buscar..."
class="bg-slate-700 border border-slate-600 p-2 rounded text-white focus:ring-2 focus:ring-teal-500">

<div id="actions" class="hidden flex gap-2">
<button onclick="openAddSectorModal()" class="bg-slate-700 hover:bg-slate-600 px-3 py-2 rounded">
+ Setor
</button>

<button onclick="openAddComputerModal()" class="bg-teal-600 hover:bg-teal-500 px-3 py-2 rounded">
+ PC
</button>
</div>

</div>
</div>

<div id="mainContent" class="p-6 overflow-y-auto flex-1"></div>

</main>

<!-- MODAIS DARK -->

<div id="clientModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
<div class="bg-slate-800 border border-slate-700 p-6 rounded-xl w-80">

<input id="newClientName" placeholder="Empresa"
class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 mb-3">

<button onclick="addClient()" class="w-full bg-teal-600 py-2 rounded">
Salvar
</button>

</div>
</div>

<div id="sectorModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
<div class="bg-slate-800 border border-slate-700 p-6 rounded-xl w-80">

<h3 class="mb-3 font-bold">Setor</h3>

<input id="newSectorName" placeholder="Nome"
class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 mb-3">

<div class="flex gap-2">
<button onclick="close('sectorModal')" class="w-1/2 bg-slate-600 p-2 rounded">Cancelar</button>
<button onclick="addSector()" class="w-1/2 bg-teal-600 p-2 rounded">Salvar</button>
</div>

</div>
</div>

<div id="computerModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
<div class="bg-slate-800 border border-slate-700 p-6 rounded-xl w-96">

<input id="pcName" placeholder="Nome PC" class="input">
<select id="pcSetor" class="input"></select>
<input id="pcConfig" placeholder="Configuração" class="input">
<input id="pcAnyId" placeholder="AnyDesk ID" class="input">
<input id="pcAnyPass" placeholder="Senha" class="input">

<button onclick="addComputer()" class="w-full bg-teal-600 py-2 rounded mt-2">
Salvar
</button>

</div>
</div>

<!-- TOAST -->
<div id="toast" class="hidden fixed bottom-5 right-5 bg-teal-600 px-4 py-2 rounded shadow"></div>

<style>
.input{
width:100%;
padding:10px;
margin-bottom:8px;
background:#334155;
border:1px solid #475569;
border-radius:8px;
color:white;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyBOc-qReOgBoDWQOYVNSlNMgRjF_hfH6uw",
authDomain:"sistema-chamados-99e49.firebaseapp.com",
projectId:"sistema-chamados-99e49"
});

const db=getFirestore(app);
const auth=getAuth(app);

let clients=[], computers=[], sectors=[];
let selectedClientId=null;
let editingComputerId=null;

onAuthStateChanged(auth,user=>{
if(!user) window.location.href="login-tecnico.html";
else start();
});

function start(){

onSnapshot(collection(db,"clientes"),snap=>{
clients=[]; snap.forEach(d=>clients.push({id:d.id,...d.data()}));
renderClients();
});

onSnapshot(collection(db,"computadores"),snap=>{
computers=[]; snap.forEach(d=>computers.push({id:d.id,...d.data()}));
render();
});

onSnapshot(collection(db,"setores"),snap=>{
sectors=[]; snap.forEach(d=>sectors.push({id:d.id,...d.data()}));
});
}

window.addClient=async()=>{
await addDoc(collection(db,"clientes"),{name:newClientName.value});
close("clientModal"); toast("Empresa criada");
};

window.addSector=async()=>{
await addDoc(collection(db,"setores"),{
name:newSectorName.value,
clientId:selectedClientId
});
close("sectorModal"); toast("Setor criado");
};

window.addComputer=async()=>{
const sectorId=pcSetor.value;
const setor=sectors.find(s=>s.id===sectorId);

if(editingComputerId){
await updateDoc(doc(db,"computadores",editingComputerId),{
name:pcName.value,
sectorId,
sectorName:setor?.name||"",
config:pcConfig.value,
anyId:pcAnyId.value,
anyPass:pcAnyPass.value
});
toast("Atualizado");
}else{
await addDoc(collection(db,"computadores"),{
clientId:selectedClientId,
name:pcName.value,
sectorId,
sectorName:setor?.name||"",
config:pcConfig.value,
anyId:pcAnyId.value,
anyPass:pcAnyPass.value
});
toast("Cadastrado");
}

editingComputerId=null;
close("computerModal");
};

window.deleteComputer=async(id)=>{
if(confirm("Excluir?")){
await deleteDoc(doc(db,"computadores",id));
toast("Removido");
}
};

window.editComputer=id=>{
const pc=computers.find(p=>p.id===id);
editingComputerId=id;

pcName.value=pc.name;
pcConfig.value=pc.config;
pcAnyId.value=pc.anyId;
pcAnyPass.value=pc.anyPass;

loadSectors();
pcSetor.value=pc.sectorId;

open("computerModal");
};

window.selectClient=id=>{
selectedClientId=id;
actions.classList.remove("hidden");

currentClientTitle.innerText=clients.find(c=>c.id===id).name;
render();
};

function renderClients(){
clientList.innerHTML=clients.map(c=>`
<div onclick="selectClient('${c.id}')" class="p-2 bg-slate-700 rounded cursor-pointer hover:bg-slate-600">
${c.name}
</div>`).join("");
}

function render(){
if(!selectedClientId)return;

const search=searchInput.value.toLowerCase();

const list=computers.filter(p=>
p.clientId===selectedClientId &&
(p.name?.toLowerCase().includes(search) ||
p.sectorName?.toLowerCase().includes(search))
);

const grouped={};

list.forEach(p=>{
const key=p.sectorName||"Sem setor";
if(!grouped[key])grouped[key]=[];
grouped[key].push(p);
});

mainContent.innerHTML=Object.keys(grouped).map(setor=>`
<h2 class="mb-2 mt-4 text-teal-400 font-bold">${setor} (${grouped[setor].length})</h2>

<div class="grid md:grid-cols-3 gap-3">

${grouped[setor].map(pc=>`
<div class="bg-slate-800 p-4 rounded-xl border border-slate-700 card relative">

<div class="absolute top-2 right-2 flex gap-2">
<i class="fas fa-pen cursor-pointer" onclick="editComputer('${pc.id}')"></i>
<i class="fas fa-trash text-red-400 cursor-pointer" onclick="deleteComputer('${pc.id}')"></i>
</div>

<b>${pc.name}</b>
<div class="text-sm text-slate-400">${pc.config||""}</div>
<div class="text-xs mt-2">ID: ${pc.anyId}</div>

</div>
`).join("")}

</div>
`).join("");
}

window.openAddClientModal=()=>open("clientModal");
window.openAddSectorModal=()=>open("sectorModal");

window.openAddComputerModal=()=>{
editingComputerId=null;
pcName.value="";
pcConfig.value="";
pcAnyId.value="";
pcAnyPass.value="";
loadSectors();
open("computerModal");
};

function loadSectors(){
const list=sectors.filter(s=>s.clientId===selectedClientId);
pcSetor.innerHTML=list.map(s=>`<option value="${s.id}">${s.name}</option>`).join("");
}

function open(id){document.getElementById(id).classList.remove("hidden")}
function close(id){document.getElementById(id).classList.add("hidden")}

function toast(msg){
toast.innerText=msg;
toast.classList.remove("hidden");
setTimeout(()=>toast.classList.add("hidden"),2000);
}
</script>

</body>
</html>
