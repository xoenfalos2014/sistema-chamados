<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

// 🔥 PUSH
import { getMessaging, getToken, onMessage } 
from "https://www.gstatic.com/firebasejs/11.6.1/firebase-messaging.js";

const app = initializeApp({
apiKey:"AIzaSyBOc-qReOgBoDWQOYVNSlNMgRjF_hfH6uw",
authDomain:"sistema-chamados-99e49.firebaseapp.com",
projectId:"sistema-chamados-99e49",
messagingSenderId:"SEU_SENDER_ID_AQUI",
appId:"SEU_APP_ID_AQUI"
});

const db = getFirestore(app);
const auth = getAuth(app);

// 🔔 INIT PUSH
const messaging = getMessaging(app);

async function initPush(){

try{

const permission = await Notification.requestPermission();

if(permission !== "granted"){
console.log("Notificação negada");
return;
}

const token = await getToken(messaging,{
vapidKey: "SUA_VAPID_KEY_AQUI"
});

console.log("TOKEN:", token);

// salva token
await addDoc(collection(db,"tokens"),{
token,
createdAt: new Date()
});

}catch(e){
console.error("Erro push:", e);
}

}

// 🔔 RECEBER COM APP ABERTO
onMessage(messaging,(payload)=>{
showToast("🔔 " + payload.notification.title);
});

// 🔐 LOGIN
onAuthStateChanged(auth,(user)=>{
if(!user){
window.location.href="login-tecnico.html";
}else{
initPush(); // 🔥 ativa push
start();
}
});

</script>
