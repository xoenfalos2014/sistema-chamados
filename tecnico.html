<!DOCTYPE html>

<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Técnico - WG Informática</title>

  <!-- Fontes -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind -->

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide -->

  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Firebase -->

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

  <script src="js/firebase-config.js"></script>

</head>

<body class="bg-zinc-950 text-zinc-200 font-sans">

<div class="p-6">
  <h1 class="text-2xl font-bold mb-4">Painel Técnico</h1>

  <div id="lista-tarefas"></div>
</div>

<script>
lucide.createIcons();

const db = firebase.firestore();
const auth = firebase.auth();

let chamados = [];

auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login-tecnico.html";
    return;
  }
  carregarChamados();
});

function carregarChamados() {
  db.collection("chamados").onSnapshot(snapshot => {
    chamados = snapshot.docs.map(doc => ({
      id: doc.id,
      ...doc.data()
    }));
    render();
  });
}

function render() {
  let html = "";

  chamados.forEach(c => {
    html += `
      <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-5 mb-4">

        <div class="flex justify-between mb-2">
          <div>
            <h3 class="font-bold text-lg">${c.empresa || c.nome || 'Cliente'}</h3>
            <p class="text-xs text-zinc-400">${c.setor || ''}</p>
          </div>
          <span class="text-xs">${c.status || ''}</span>
        </div>

        <p class="text-sm text-zinc-300 mb-4">${c.mensagem || ''}</p>

        <div class="flex gap-2">

          <button onclick="mudarStatus('${c.id}','Em Andamento')" 
            class="px-3 py-1 bg-blue-500/20 text-blue-400 rounded text-xs">
            Iniciar
          </button>

          <button onclick="mudarStatus('${c.id}','Resolvido')" 
            class="px-3 py-1 bg-emerald-500/20 text-emerald-400 rounded text-xs">
            Finalizar
          </button>

          <!-- 🔥 BOTÃO DE CHAT -->
          <button onclick="abrirChat('${c.id}','${c.empresa || c.nome || 'Cliente'}')" 
            class="px-3 py-1 bg-emerald-500/20 text-emerald-300 rounded text-xs flex items-center gap-1">
            <i data-lucide="message-circle" class="w-4 h-4"></i>
            Chat
          </button>

        </div>

      </div>
    `;
  });

  document.getElementById("lista-tarefas").innerHTML = html;
  lucide.createIcons();
}

function abrirChat(id, nome) {
  const url = `zap.html?chamado=${id}&cliente=${encodeURIComponent(nome)}`;
  window.open(url, '_blank');
}

function mudarStatus(id, status) {
  db.collection("chamados").doc(id).update({ status });
}
</script>

</body>
</html>
